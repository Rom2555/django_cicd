name: testing and deploying

on:
  push:
    branches: [ main ]

jobs:
  testing:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: test-secret-key-ci-12345
      DEBUG: 1
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_PASSWORD: test_pass
      DB_NAME: test_db
      DB_USER: test_user
      DB_PORT: 5432
      DB_HOST: localhost

    services:
      postgresql_main:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Проверяем на наличие изменений в репозитории.
        uses: actions/checkout@v4

      - name: Установка Python.
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Устанавливаем зависимости из requirements.txt.
        run: pip install -r requirements.txt

      - name: Линтинг кода
        run: flake8 logistic/ --exclude=logistic/migrations/

      - name: Тестирование
        run: python manage.py test
        env:
          SECRET_KEY: ${{ env.SECRET_KEY }}
          DEBUG: ${{ env.DEBUG }}
          ALLOWED_HOSTS: ${{ env.ALLOWED_HOSTS }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
          DB_NAME: ${{ env.DB_NAME }}
          DB_USER: ${{ env.DB_USER }}
          DB_PORT: ${{ env.DB_PORT }}
          DB_HOST: ${{ env.DB_HOST }}




